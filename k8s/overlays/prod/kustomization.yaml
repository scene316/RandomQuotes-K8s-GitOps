apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
- ../../base

secretGenerator:
  - name: random-quotes-secrets
    literals:
      - homepageDisplay="FunFin prod"

images:
- name: scene316/randomquotes-k8s
  newName: scene316/randomquotes-k8s
  newTag: "0.1.48"

patches:
 - target:
    kind: Ingress
    name: randomquotes-ingress-nginx
   path: randomquotes-ingress-nginx.yaml